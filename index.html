<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="container-form">

            <form class="sign-in">
                <h2>Iniciar sesión</h2>
                
                <div class="container-input">
                    <label>Email</label>                  
                    <input type="email"> 
                </div>

                 <div class="container-input">
                    <label>Contraseña</label>                  
                    <input type="password" > 
                </div>

                <a href="#">Forgot password</a>
                    <button class="buttom">Iniciar sesión</button>

            </form>

        </div>

        <div class="container-form">
            <form class="sign-up">
                <h2>Crear cuenta</h2>

                 <div class="container-input">
                    <label>Nombre</label>                  
                    <input type="name" > 
                </div>

                 <div class="container-input">
                    <label>Email</label>                  
                    <input type="email" > 
                </div>

                 <div class="container-input">
                    <label>Contraseña</label>                  
                    <input type="password"> 
                </div>

                 <button class="buttom">Crear cuenta</button>
            </form>

        </div>

        <div class="container-welcome">
            <div class="welcome-sign-up welcome">
                <h3>Bienvenido</h3>
                <button class="buttom" id="btn-sign-up">Crear cuenta</button>

            </div>

            <div class="welcome-sign-in welcome">
                <h3>¡Qué gusto verte de nuevo!</h3>
                <button class="buttom" id="btn-sign-in">Iniciar sesión</button>

            </div>
        </div>

    </div>
    

    <script src="/script.js"></script>
    
</body>
</html>
